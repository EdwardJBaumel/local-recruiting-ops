[pytest]
# rootdir is lantern/api so `core.x` / `agents.x` imports resolve the same
# way they do when the app runs (main.py / server.py live here too).
# conftest.py adds this dir to sys.path explicitly; testpaths keeps
# collection scoped to the suite.
testpaths = tests
python_files = test_*.py
addopts = -ra
